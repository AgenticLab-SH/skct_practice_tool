<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKCT 고급 기능 인증</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f8fafc;
            --panel: #ffffff;
            --line: #dbe2ea;
            --text: #0f172a;
            --muted: #64748b;
            --accent: #2563eb;
            --accent-dark: #1d4ed8;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Pretendard', 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #eff6ff 0%, var(--bg) 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }
        .panel {
            max-width: 420px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }
        h1 {
            margin: 0 0 6px;
            font-size: 22px;
        }
        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.55;
            font-size: 13px;
        }
        .stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-size: 12px;
            font-weight: 700;
            color: #334155;
        }
        input, textarea, pre {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px 14px;
            font: inherit;
            background: #fff;
            color: var(--text);
        }
        textarea {
            min-height: 108px;
            resize: vertical;
        }
        pre {
            min-height: 168px;
            white-space: pre-wrap;
            word-break: break-word;
            background: #f8fafc;
            font-size: 12px;
            line-height: 1.5;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            border: none;
            border-radius: 12px;
            padding: 11px 14px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }
        .primary {
            background: var(--accent);
            color: white;
        }
        .primary:hover { background: var(--accent-dark); }
        .ghost {
            background: #e2e8f0;
            color: #334155;
        }
        .section {
            border-top: 1px solid #e2e8f0;
            padding-top: 14px;
        }
        .hidden { display: none !important; }
        .status {
            font-size: 12px;
            color: var(--muted);
            min-height: 18px;
        }
    </style>
</head>
<body>
    <div class="panel stack">
        <div>
            <h1>고급 기능 인증</h1>
            <p>비밀번호 확인 후 실제 팝업 웹의 고급 기능 버전으로 전환됩니다.</p>
        </div>

        <section id="authSection" class="stack">
            <div class="field">
                <label for="advancedPasswordInput">비밀번호</label>
                <input id="advancedPasswordInput" type="password" autocomplete="off" inputmode="numeric">
            </div>
            <div class="actions">
                <button id="advancedLoginBtn" class="primary" type="button">확인</button>
            </div>
            <div id="authStatus" class="status"></div>
        </section>
    </div>

    <script>
        const bridge = window.opener && window.opener.SKCTAdvancedBridge;
        const authStatus = document.getElementById('authStatus');
        const passwordInput = document.getElementById('advancedPasswordInput');
        const loginButton = document.getElementById('advancedLoginBtn');

        if (!bridge) {
            authStatus.textContent = '원본 창과 연결되지 않아 사용할 수 없습니다.';
            loginButton.disabled = true;
        };

        loginButton.addEventListener('click', () => {
            if (!bridge) return;
            const password = passwordInput.value.trim();
            if (!bridge.validatePassword(password)) {
                authStatus.textContent = '비밀번호가 일치하지 않습니다.';
                passwordInput.select();
                return;
            }
            const launch = bridge.activateAdvancedSession();
            authStatus.textContent = '고급 버전 팝업 웹으로 전환 중입니다.';
            window.name = launch.popupName;
            window.location.replace(launch.targetUrl);
        });

        passwordInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                loginButton.click();
            }
        });
    </script>
</body>
</html>
