<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKCT Tool - Admin Hidden</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --subtle: #6b7280;
            --line: #dbe3ef;
            --accent: #0f766e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Pretendard", "Noto Sans KR", sans-serif;
            background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 68%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: min(560px, 100%);
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 28px;
        }

        p {
            margin: 0 0 14px;
            line-height: 1.6;
            color: var(--subtle);
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 16px;
            border-radius: 12px;
            background: var(--accent);
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>관리자 페이지는 공개 배포물에 포함되지 않습니다.</h1>
        <p>현재 공개 사이트는 일반 사용자용 화면만 배포합니다.</p>
        <p>관리자 작업은 별도 운영 경로에서만 진행합니다.</p>
        <a href="./index.html">메인 화면으로 이동</a>
    </main>
</body>
</html>
