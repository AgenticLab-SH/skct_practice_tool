                    SKCT Tool은 한 화면에서 OMR, 타이머, 메모장, 그림판, 계산기를 같이 쓰는 연습 도구입니다.

            <section class="docs-section">
                <h2 class="docs-section-title">핵심 흐름 5단계</h2>
                <div class="docs-grid two">
                    <article class="docs-card strong">
                        <div class="eyebrow">1. 시작</div>
                        <h2>타이머와 연습 모드를 먼저 확인</h2>
                        <p>좌측 설정에서 전체 시간, 과목 시간, 쉬는 시간을 확인한 뒤 타이머를 시작합니다. 기본값은 실제 연습 리듬을 맞추는 기준선으로 유지하는 편이 좋습니다.</p>
                    </article>
                    <article class="docs-card strong">
                        <div class="eyebrow">2. 풀이</div>
                        <h2>OMR과 보조 도구를 같이 사용</h2>
                        <p>문제를 풀면서 OMR에 답을 체크하고, 메모장이나 그림판은 풀이 보조용으로 씁니다. 계산기는 실제 시험처럼 제한된 조작 흐름을 유지합니다.</p>
                    </article>
                    <article class="docs-card strong">
                        <div class="eyebrow">3. 쉬는 시간</div>
                        <h2>과목 전환 리듬 익히기</h2>
                        <p>쉬는 시간이 자동으로 들어가면 다음 과목 시작 전까지 흐름을 정리할 수 있습니다. 필요하면 쉬는 시간 건너뛰기를 사용할 수 있습니다.</p>
                    </article>
                    <article class="docs-card strong">
                        <div class="eyebrow">4. 채점</div>
                        <h2>정답 입력 후 결과 확인</h2>
                        <p>정답 입력 모드로 전환한 뒤 정답을 넣고 채점합니다. 결과 패널에서 맞은 수, 푼 수, 정답률, 건너뛴 수를 한 번에 봅니다.</p>
                    </article>
                    <article class="docs-card strong">
                        <div class="eyebrow">5. 복기</div>

                            <li>건너뛰기와 과목 단위 흐름 보정이 들어 있습니다.</li>
                        </ul>
                    </article>

                        <h3>타이머</h3>
                        <ul>

                            <li>쉬는 시간과 다음 과목 전환이 자동으로 이어집니다.</li>

                        </ul>

                            <li>메모장은 텍스트 기록, 그림판은 빠른 도식화에 적합합니다.</li>
                            <li>계산기는 실전형 제한 흐름을 유지합니다.</li>

            <section class="docs-section">
                <h2 class="docs-section-title">인지영역별 연습법 — 이 도구를 이렇게 쓰세요</h2>
                <p style="margin:0 0 16px; color:#475569; line-height:1.8;">
                    SKCT(SK 종합역량검사)는 영역마다 제한시간이 따로 주어지고, 화면에 OMR·계산기가 함께 제공됩니다.
                    그래서 문제 실력만큼이나 <strong>영역별 시간배분과 화면 도구 활용</strong>이 점수를 좌우합니다.
                    아래는 흔히 다뤄지는 인지영역과, 본 연습 도구를 활용하는 방법을 정리한 것입니다.
                    (영역 구성·시간은 채용 연도·직무에 따라 달라질 수 있으니 기본값은 본인 기준에 맞게 설정에서 조정하세요.)
                </p>
                <div class="docs-grid two">
                    <article class="docs-card">
                        <h3>언어이해</h3>
                        <p>지문을 빠르게 읽고 핵심을 잡는 영역입니다. 타이머의 과목 시간을 짧게 두고, 한 지문에 머무는 시간을 메모장에 적어가며 <strong>지문당 페이스</strong>를 몸에 익히세요.</p>
                    </article>
                    <article class="docs-card">
                        <h3>언어추리</h3>
                        <p>조건·명제를 정리해 결론을 끌어내는 영역입니다. 그림판에 관계도를 빠르게 도식화하는 연습을 하면, 실제 시험의 화면 메모 흐름과 가까워집니다.</p>
                    </article>
                    <article class="docs-card">
                        <h3>자료해석</h3>
                        <p>표·그래프 수치를 계산하는 영역입니다. 화면 계산기로 마우스 계산에 익숙해지고, 그림판에 중간값을 적어두는 습관을 들이면 실수가 줄어듭니다.</p>
                    </article>
                    <article class="docs-card">
                        <h3>창의수리</h3>
                        <p>응용 계산·수리 문제 영역입니다. 계산기 사용 가능 범위를 실전처럼 제한해 연습하면, 손계산과 도구 계산의 균형을 잡을 수 있습니다.</p>
                    </article>
                    <article class="docs-card">
                        <h3>수열추리</h3>
                        <p>규칙을 찾는 영역입니다. 후보 규칙을 그림판/메모장에 빠르게 적고 지우는 연습으로, 한 문항에 과도하게 묶이지 않는 판단력을 기르세요.</p>
                    </article>
                    <article class="docs-card">
                        <h3>영역별 시간배분 전략</h3>
                        <p>다중 페이즈 타이머로 영역이 자동 전환되므로, <strong>'막히면 건너뛰고 표시'</strong>하는 흐름을 미리 몸에 익히는 것이 핵심입니다. 채점 후 과목별 통계로 약한 영역을 찾아 시간을 재배분하세요.</p>
                    </article>
                </div>
            </section>
